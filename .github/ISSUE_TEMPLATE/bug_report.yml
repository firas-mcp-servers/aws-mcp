name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Call tool `list_instances` with ...
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or stack traces.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `poetry run aws-mcp --version` or package version
    validations:
      required: false

  - type: input
    id: python
    attributes:
      label: Python Version
      description: Output of `python --version`
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: AWS region, service, any other relevant context.
    validations:
      required: false
